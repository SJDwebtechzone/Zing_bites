<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4B1F" />
      <stop offset="100%" stop-color="#FF9068" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Truck Chassis -->
    <path d="M 20 40 
             C 20 30, 25 25, 35 25 
             L 80 25 
             C 90 25, 95 30, 95 38 
             L 105 55 
             C 108 60, 108 65, 108 70 
             L 108 90 
             C 108 95, 105 98, 100 98 
             L 95 98 
             A 12 12 0 0 0 71 98 
             L 55 98 
             A 12 12 0 0 0 31 98 
             L 25 98 
             C 20 98, 15 95, 15 90 
             Z" fill="#1a1a2e" />

    <!-- Truck Cap / Roof -->
    <path d="M 22 40 
             C 22 32, 26 28, 35 28 
             L 78 28 
             L 78 40 
             Z" fill="url(#truckGrad)" />
             
    <!-- Windshield -->
    <path d="M 80 32 L 86 32 L 98 50 L 80 50 Z" fill="#ffffff" />

    <!-- Service Window -->
    <rect x="25" y="45" width="45" height="25" fill="#f0f0f5" rx="3" />
    <path d="M 25 45 L 70 45 L 70 52 L 25 52 Z" fill="url(#truckGrad)" />
    
    <!-- Bold Lightning Bolt Center -->
    <path d="M 52 32 L 34 60 L 46 60 L 40 88 L 74 50 L 58 50 Z" fill="#FF4B1F" />

    <!-- Wheels -->
    <circle cx="43" cy="98" r="12" fill="#2d2d3a" />
    <circle cx="43" cy="98" r="5" fill="#FF9068" />
    <circle cx="83" cy="98" r="12" fill="#2d2d3a" />
    <circle cx="83" cy="98" r="5" fill="#FF9068" />
  </g>
</svg>
